name = "mochi_studio"
version = "0.1.0"
description = "GraphQL studio for mochi — interactive playground, query collections, and visual schema builder"
licences = ["Apache-2.0"]
repository = { type = "github", user = "qwexvf", repo = "mochi" }
[dependencies]
gleam_stdlib = ">= 0.71.0 and < 1.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
gleam_fetch = ">= 1.4.0 and < 2.0.0"
wisp = ">= 2.2.2 and < 3.0.0"
mist = ">= 6.0.2 and < 7.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.9.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.6 and < 3.0.0"
